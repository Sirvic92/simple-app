name: devops workflow

on:
  push:
    branches: [ main ]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v8.0.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ vars.SONAR_URL }}

    - name: Checkov scan
      uses: bridgecrewio/checkov-action@v12.1347.0
      with:
        directory: .
        soft_fail: true

    - name: Build API image
      uses: docker/build-push-action@v7
      with:
        context: s9/app01
        file: s9/app01/api.Dockerfile
        push: false
        tags: simple-app-api:latest

    - name: Build frontend image
      uses: docker/build-push-action@v7
      with:
        context: s9/app01
        file: s9/app01/frontend.Dockerfile
        push: false
        tags: simple-app-frontend:latest

    - name: Build database image
      uses: docker/build-push-action@v7
      with:
        context: s9/app01
        file: s9/app01/db.Dockerfile
        push: false
        tags: simple-app-db:latest
    - name: Run tests
      run: sudo docker images
